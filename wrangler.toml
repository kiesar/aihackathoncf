name = "aihackathoncf"
pages_build_output_dir = ".next"
compatibility_date = "2026-06-08"

[env.production.vars]
NODE_VERSION = "25.2.1"
main = "src/index.html"

[assets]
directory = "./public/assets"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1